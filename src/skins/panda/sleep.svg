<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <g transform="rotate(-12 128 150)">
    <!-- ears -->
    <ellipse cx="80" cy="78" rx="22" ry="22" fill="#2a2a30"/>
    <ellipse cx="180" cy="78" rx="22" ry="22" fill="#2a2a30"/>
    <ellipse cx="80" cy="80" rx="11" ry="11" fill="#46464e"/>
    <ellipse cx="180" cy="80" rx="11" ry="11" fill="#46464e"/>
    <!-- head -->
    <ellipse cx="130" cy="152" rx="80" ry="74" fill="#f3f1ec" stroke="#2a2a30" stroke-width="3"/>
    <!-- eye patches -->
    <ellipse cx="100" cy="146" rx="20" ry="24" fill="#2a2a30" transform="rotate(-12 100 146)"/>
    <ellipse cx="160" cy="146" rx="20" ry="24" fill="#2a2a30" transform="rotate(12 160 146)"/>
    <!-- closed eyes (smiles) -->
    <path d="M86 144 Q100 154 114 144" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M146 144 Q160 154 174 144" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- nose -->
    <ellipse cx="130" cy="174" rx="6" ry="4.5" fill="#2a2a30"/>
    <!-- relaxed mouth + bubble -->
    <path d="M120 188 Q130 196 140 188" stroke="#2a2a30" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="148" cy="200" r="4" fill="#fff" stroke="#2a2a30" stroke-width="2"/>
  </g>
  <!-- ZZZ -->
  <g fill="#7a86ff" font-family="-apple-system, sans-serif" font-weight="700">
    <text x="190" y="64" font-size="22">Z</text>
    <text x="208" y="44" font-size="16">z</text>
    <text x="222" y="30" font-size="12">z</text>
  </g>
</svg>
