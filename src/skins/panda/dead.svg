<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <g transform="rotate(-22 128 160) translate(0 14)">
    <!-- ears squashed -->
    <ellipse cx="84" cy="92" rx="22" ry="14" fill="#3a3a40" transform="rotate(-15 84 92)"/>
    <ellipse cx="180" cy="100" rx="22" ry="14" fill="#3a3a40" transform="rotate(35 180 100)"/>
    <ellipse cx="84" cy="92" rx="11" ry="6" fill="#5a5a62" transform="rotate(-15 84 92)"/>
    <ellipse cx="180" cy="100" rx="11" ry="6" fill="#5a5a62" transform="rotate(35 180 100)"/>
    <!-- head, sagging -->
    <ellipse cx="130" cy="160" rx="82" ry="70" fill="#e8e6df" stroke="#3a3a40" stroke-width="3"/>
    <!-- eye patches -->
    <ellipse cx="100" cy="152" rx="22" ry="22" fill="#3a3a40"/>
    <ellipse cx="160" cy="152" rx="22" ry="22" fill="#3a3a40"/>
    <!-- X X eyes -->
    <g stroke="#fff" stroke-width="4" stroke-linecap="round">
      <line x1="90" y1="142" x2="110" y2="162"/>
      <line x1="110" y1="142" x2="90" y2="162"/>
      <line x1="150" y1="142" x2="170" y2="162"/>
      <line x1="170" y1="142" x2="150" y2="162"/>
    </g>
    <!-- nose -->
    <ellipse cx="130" cy="180" rx="6" ry="4.5" fill="#3a3a40"/>
    <!-- open dead mouth + tongue -->
    <ellipse cx="130" cy="200" rx="14" ry="9" fill="#3a3a40"/>
    <ellipse cx="130" cy="206" rx="9" ry="5" fill="#ff8aa6"/>
  </g>
  <!-- floating skull (cute) -->
  <g transform="translate(206 60)">
    <circle cx="0" cy="0" r="11" fill="#fff" stroke="#3a3a40" stroke-width="2"/>
    <circle cx="-3.5" cy="-1" r="2" fill="#3a3a40"/>
    <circle cx="3.5" cy="-1" r="2" fill="#3a3a40"/>
    <path d="M-3 5 L-1 7 L1 5 L3 7" stroke="#3a3a40" stroke-width="1.4" fill="none"/>
  </g>
</svg>
