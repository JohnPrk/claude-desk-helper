<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="cheek-t" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb3c1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffb3c1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="rotate(-6 128 140)">
    <!-- ears (one droopy) -->
    <ellipse cx="78" cy="68" rx="22" ry="22" fill="#2a2a30"/>
    <ellipse cx="180" cy="74" rx="22" ry="20" fill="#2a2a30" transform="rotate(20 180 74)"/>
    <ellipse cx="78" cy="70" rx="11" ry="11" fill="#46464e"/>
    <ellipse cx="180" cy="76" rx="11" ry="10" fill="#46464e"/>
    <!-- head -->
    <ellipse cx="128" cy="142" rx="78" ry="72" fill="#f7f5f0" stroke="#2a2a30" stroke-width="3"/>
    <!-- eye patches drooping -->
    <ellipse cx="98" cy="138" rx="20" ry="24" fill="#2a2a30" transform="rotate(-22 98 138)"/>
    <ellipse cx="158" cy="138" rx="20" ry="24" fill="#2a2a30" transform="rotate(22 158 138)"/>
    <!-- half-closed eyes -->
    <path d="M88 136 Q100 142 112 136" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M146 136 Q158 142 170 136" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- cheeks faint -->
    <circle cx="78" cy="166" r="10" fill="url(#cheek-t)"/>
    <circle cx="178" cy="166" r="10" fill="url(#cheek-t)"/>
    <!-- nose -->
    <ellipse cx="128" cy="164" rx="6" ry="4.5" fill="#2a2a30"/>
    <!-- flat tired mouth -->
    <path d="M118 180 Q128 184 138 180" stroke="#2a2a30" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- sweat drop -->
  <g transform="translate(206 90)" fill="#7ec8ff" stroke="#3a8fc2" stroke-width="1.2">
    <path d="M0 -10 Q-6 0 0 10 Q6 0 0 -10 Z"/>
  </g>
</svg>
